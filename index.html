<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WordQuest - えいごをおぼえよう</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Kosugi+Maru&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0f1923;
      --bg2: #162032;
      --surface: #1a2840;
      --surface2: #243552;
      --accent: #58cc02;
      --accent2: #89e219;
      --accent-glow: rgba(88,204,2,0.35);
      --yellow: #ffc800;
      --red: #ff4b4b;
      --blue: #1cb0f6;
      --blue2: #49c4f8;
      --text: #e8f4fd;
      --text-muted: #8baac8;
      --card-shadow: 0 8px 32px rgba(0,0,0,0.45);
      --radius: 20px;
      --radius-sm: 12px;
      --font: 'Nunito', 'Kosugi Maru', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: var(--font); background: var(--bg); color: var(--text); overflow-x: hidden; }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 800px 500px at 10% 20%, rgba(28,176,246,0.07) 0%, transparent 70%),
        radial-gradient(ellipse 600px 400px at 90% 80%, rgba(88,204,2,0.06) 0%, transparent 70%);
      pointer-events: none; z-index: 0;
    }

    #app {
      position: relative; z-index: 1; min-height: 100vh;
      display: flex; flex-direction: column; align-items: center;
      justify-content: flex-start; padding: 24px 16px 40px;
    }

    /* ===== メニュー ===== */
    .menu-screen { width: 100%; max-width: 440px; display: flex; flex-direction: column; align-items: center; gap: 28px; animation: fadeUp .5s ease both; }
    .logo-area { text-align: center; margin-top: 16px; }
    .logo-icon { font-size: 64px; animation: bounce 2s infinite; }
    .logo-title { font-size: 2.8rem; font-weight: 900; background: linear-gradient(135deg,#58cc02,#1cb0f6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; letter-spacing: -1px; line-height: 1; margin-top: 8px; }
    .logo-sub { font-size: 1rem; color: var(--text-muted); margin-top: 8px; font-weight: 600; }

    .filter-bar { width: 100%; display: flex; align-items: center; gap: 12px; background: var(--surface); border-radius: var(--radius-sm); padding: 14px 18px; box-shadow: var(--card-shadow); }
    .filter-label { font-size: .9rem; color: var(--text-muted); font-weight: 700; white-space: nowrap; }
    .cat-select { flex: 1; background: var(--bg2); border: 2px solid var(--surface2); border-radius: 8px; color: var(--text); font-family: var(--font); font-size: .95rem; font-weight: 700; padding: 6px 10px; cursor: pointer; outline: none; }
    .cat-select:focus { border-color: var(--blue); }

    .mode-cards { width: 100%; display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .mode-card { background: var(--surface); border: 2px solid transparent; border-radius: var(--radius); padding: 24px 16px; display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer; transition: transform .18s, border-color .18s, box-shadow .18s; box-shadow: var(--card-shadow); }
    .mode-card:hover { transform: translateY(-4px); }
    .study-card:hover { border-color: var(--blue); box-shadow: 0 12px 40px rgba(28,176,246,.25); }
    .game-card:hover  { border-color: var(--accent); box-shadow: 0 12px 40px var(--accent-glow); }
    .mode-icon { font-size: 2.8rem; }
    .mode-name { font-size: 1rem; font-weight: 900; }
    .mode-desc { font-size: .78rem; color: var(--text-muted); text-align: center; line-height: 1.5; }
    .word-count-badge { background: var(--surface2); color: var(--blue2); font-size: .85rem; font-weight: 700; padding: 6px 18px; border-radius: 999px; }

    /* ===== 共通ヘッダー ===== */
    .study-header, .game-header { width: 100%; max-width: 440px; display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
    .back-btn { background: var(--surface); border: none; color: var(--text-muted); font-family: var(--font); font-size: .85rem; font-weight: 700; padding: 8px 14px; border-radius: 999px; cursor: pointer; white-space: nowrap; transition: color .2s, background .2s; }
    .back-btn:hover { color: var(--text); background: var(--surface2); }
    .study-progress-wrap, .game-progress-wrap { flex: 1; height: 10px; background: var(--surface2); border-radius: 999px; overflow: hidden; }
    .study-progress-bar { height: 100%; background: linear-gradient(90deg,var(--blue),var(--blue2)); border-radius: 999px; transition: width .4s ease; }
    .game-progress-bar  { height: 100%; background: linear-gradient(90deg,var(--accent),var(--accent2)); border-radius: 999px; transition: width .4s ease; }
    .study-counter, .game-counter { font-size: .85rem; font-weight: 800; color: var(--text-muted); white-space: nowrap; }

    /* ===== 暗記モード ===== */
    .study-screen { width: 100%; max-width: 440px; display: flex; flex-direction: column; align-items: center; animation: fadeUp .4s ease both; }
    .card-area { perspective: 1200px; width: 100%; margin: 8px 0 24px; }
    .flash-card { width: 100%; min-height: 260px; position: relative; transform-style: preserve-3d; transition: transform .5s cubic-bezier(.4,0,.2,1); cursor: pointer; border-radius: var(--radius); }
    .flash-card.flipped { transform: rotateY(180deg); }
    .card-front, .card-back { position: absolute; inset: 0; backface-visibility: hidden; -webkit-backface-visibility: hidden; border-radius: var(--radius); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; padding: 32px 24px; box-shadow: var(--card-shadow); }
    .card-front { background: linear-gradient(145deg,var(--surface),var(--bg2)); border: 2px solid var(--surface2); }
    .card-back  { background: linear-gradient(145deg,#1a3a5c,#162032); border: 2px solid var(--blue); transform: rotateY(180deg); }
    .card-emoji { font-size: 3.5rem; }
    .card-kanji { font-size: 2.8rem; font-weight: 900; }
    .card-hiragana { font-size: 1.1rem; color: var(--text-muted); font-weight: 600; }
    .card-hint { font-size: .8rem; color: var(--surface2); margin-top: 12px; }
    .card-english { font-size: 2.4rem; font-weight: 900; background: linear-gradient(135deg,var(--blue),var(--blue2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .card-kanji-small { font-size: 1rem; color: var(--text-muted); }
    .study-nav { display: flex; gap: 16px; width: 100%; }
    .nav-btn { flex: 1; padding: 14px; border-radius: var(--radius-sm); border: none; font-family: var(--font); font-size: 1rem; font-weight: 800; cursor: pointer; transition: transform .15s, opacity .15s; }
    .nav-btn:disabled { opacity: .3; cursor: not-allowed; }
    .prev-btn { background: var(--surface2); color: var(--text-muted); }
    .next-btn { background: var(--blue); color: #fff; box-shadow: 0 4px 20px rgba(28,176,246,.4); }
    .next-btn:hover { transform: translateY(-2px); }
    .study-category-tag { margin-top: 16px; font-size: .8rem; font-weight: 700; color: var(--text-muted); background: var(--surface); padding: 4px 14px; border-radius: 999px; }

    /* ===== ゲームモード ===== */
    .game-screen { width: 100%; max-width: 440px; display: flex; flex-direction: column; align-items: center; animation: fadeUp .35s ease both; }
    .game-hud { width: 100%; display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .hearts-wrap { display: flex; gap: 6px; }
    .heart { font-size: 1.6rem; }
    .heart.active { color: var(--red); filter: drop-shadow(0 0 6px rgba(255,75,75,.5)); }
    .heart.lost { color: var(--surface2); }
    .score-badge { background: var(--surface2); color: var(--yellow); font-size: 1rem; font-weight: 900; padding: 6px 18px; border-radius: 999px; }

    .question-area { width: 100%; background: var(--surface); border-radius: var(--radius); padding: 28px 24px 20px; text-align: center; box-shadow: var(--card-shadow); margin-bottom: 16px; border: 2px solid var(--surface2); }
    .question-label { font-size: .85rem; color: var(--text-muted); font-weight: 700; margin-bottom: 14px; }
    .question-word { display: flex; align-items: center; justify-content: center; gap: 12px; }
    .q-emoji { font-size: 2.4rem; }
    .q-kanji { font-size: 2.8rem; font-weight: 900; }
    .question-sub { font-size: 1.1rem; color: var(--text-muted); font-weight: 600; margin-top: 8px; }

    .choice-label { font-size: .85rem; color: var(--text-muted); font-weight: 700; margin-bottom: 12px; align-self: flex-start; }
    .choices-grid { width: 100%; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
    .choice-btn { background: var(--surface); border: 2px solid var(--surface2); border-radius: var(--radius-sm); padding: 16px 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; cursor: pointer; transition: transform .15s, border-color .15s, background .15s; box-shadow: 0 4px 12px rgba(0,0,0,.3); color: var(--text); font-family: var(--font); }
    .choice-btn:hover:not(:disabled) { transform: translateY(-3px); border-color: var(--blue); background: var(--surface2); }
    .choice-btn:disabled { cursor: not-allowed; }
    .choice-btn.correct { border-color: var(--accent) !important; background: rgba(88,204,2,.15) !important; animation: pulse-green .4s ease; }
    .choice-btn.wrong   { border-color: var(--red)    !important; background: rgba(255,75,75,.15)  !important; animation: shake .4s ease; }
    .choice-emoji { font-size: 2rem; }
    .choice-text  { font-size: 1rem; font-weight: 800; }
    .skip-btn { background: none; border: none; color: var(--text-muted); font-family: var(--font); font-size: .9rem; font-weight: 700; cursor: pointer; padding: 8px 16px; border-radius: 999px; transition: color .2s, background .2s; }
    .skip-btn:hover { color: var(--text); background: var(--surface); }
    .sound-btn { background: var(--surface2); border: none; color: var(--blue2); font-family: var(--font); font-size: .85rem; font-weight: 700; cursor: pointer; padding: 8px 18px; border-radius: 999px; margin-top: 10px; transition: background .2s, transform .15s; }
    .sound-btn:hover { background: var(--blue); color: #fff; transform: scale(1.05); }
    .typing-card:hover { border-color: var(--purple, #ce82ff); box-shadow: 0 12px 40px rgba(206,130,255,.25); }
    .reverse-card:hover { border-color: var(--yellow); box-shadow: 0 12px 40px rgba(255,200,0,.25); }
    .mistake-menu-btn { width: 100%; padding: 16px; background: var(--surface); border: 2px solid #ff4b4b; border-radius: var(--radius-sm); color: #ff4b4b; font-family: var(--font); font-size: 1rem; font-weight: 800; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: background .2s, transform .15s; }
    .mistake-menu-btn:hover { background: rgba(255,75,75,.1); transform: translateY(-2px); }
    .mistake-count-badge { background: #ff4b4b; color: #fff; font-size: .8rem; padding: 2px 10px; border-radius: 999px; }
    .mistake-list { width: 100%; display: flex; flex-direction: column; gap: 8px; max-height: 240px; overflow-y: auto; }
    .mistake-item { display: flex; align-items: center; gap: 10px; background: var(--surface); border-radius: var(--radius-sm); padding: 10px 14px; border-left: 3px solid #ff4b4b; }
    .mistake-word { font-size: 1.1rem; font-weight: 900; flex: 1; }
    .mistake-english { font-size: .9rem; color: var(--blue2); font-weight: 700; flex: 1; }
    .mistake-times { font-size: .75rem; color: #ff4b4b; font-weight: 700; white-space: nowrap; }
    .mistake-more { text-align: center; color: var(--text-muted); font-size: .85rem; padding: 4px 0; }

    /* ===== コンボ ===== */
    .combo-toast { position: fixed; top: 30%; left: 50%; transform: translateX(-50%); font-size: 2rem; font-weight: 900; z-index: 200; animation: comboPop .9s ease both; pointer-events: none; text-shadow: 0 0 20px rgba(255,200,0,.8); white-space: nowrap; }
    @keyframes comboPop { 0%{opacity:0;transform:translateX(-50%) scale(.5)} 30%{opacity:1;transform:translateX(-50%) scale(1.3)} 60%{transform:translateX(-50%) scale(1)} 100%{opacity:0;transform:translateX(-50%) scale(1) translateY(-30px)} }

    /* ===== バッジ通知 ===== */
    .badge-toast { position: fixed; top: 60px; left: 50%; transform: translateX(-50%); background: linear-gradient(135deg,#ffc800,#ff9f43); color: #fff; padding: 12px 20px; border-radius: var(--radius-sm); font-size: .9rem; font-weight: 800; z-index: 300; display: flex; align-items: center; gap: 10px; box-shadow: 0 8px 32px rgba(255,200,0,.5); animation: toastIn .3s ease both, toastOut .3s ease 2.2s both; white-space: nowrap; }
    .badge-toast-icon { font-size: 1.8rem; }

    /* ===== バッジ一覧（結果画面） ===== */
    .new-badges { width: 100%; background: linear-gradient(135deg,rgba(255,200,0,.15),rgba(255,159,67,.1)); border: 2px solid var(--yellow); border-radius: var(--radius-sm); padding: 14px 16px; }
    .new-badge-label { font-size: .85rem; font-weight: 700; color: var(--yellow); margin-bottom: 8px; }
    .badge-item { display: flex; align-items: center; gap: 8px; font-size: .95rem; font-weight: 700; padding: 4px 0; }
    .badge-item.new { animation: fadeUp .4s ease both; }
    .all-badges { width: 100%; }
    .badge-section-label { font-size: .8rem; color: var(--text-muted); font-weight: 700; margin-bottom: 8px; }
    .badge-grid { display: flex; flex-wrap: wrap; gap: 8px; }
    .badge-chip { font-size: 1.8rem; cursor: default; }

    /* ===== リトライメニュー ===== */
    .retry-label { font-size: .85rem; color: var(--text-muted); font-weight: 700; text-align: center; margin-bottom: 8px; }
    .retry-grid { width: 100%; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
    .retry-btn { background: var(--surface); border: 2px solid var(--surface2); border-radius: var(--radius-sm); padding: 14px 10px; display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; font-family: var(--font); font-size: 1rem; font-weight: 800; color: var(--text); transition: transform .15s, border-color .15s, background .15s; box-shadow: 0 4px 12px rgba(0,0,0,.3); }
    .retry-btn:hover { transform: translateY(-3px); border-color: var(--blue); background: var(--surface2); }
    .retry-btn span { font-size: .7rem; font-weight: 600; color: var(--text-muted); }

    /* ===== バッジメニューボタン ===== */
    .badge-menu-btn { width:100%; background:var(--surface); border:2px solid var(--yellow); border-radius:var(--radius-sm); padding:12px 16px; display:flex; align-items:center; justify-content:space-between; cursor:pointer; font-family:var(--font); transition:background .2s,transform .15s; }
    .badge-menu-btn:hover { background:rgba(255,200,0,.08); transform:translateY(-2px); }
    .badge-menu-left { display:flex; align-items:center; gap:8px; }
    .current-title-icon { font-size:1.6rem; }
    .current-title-text { font-size:.95rem; font-weight:800; color:var(--yellow); }
    .badge-menu-right { display:flex; flex-direction:column; align-items:flex-end; font-size:.85rem; font-weight:700; color:var(--text-muted); gap:2px; }
    .next-title-hint { font-size:.7rem; color:var(--text-muted); }

    /* ===== バッジ画面 ===== */
    .badge-page { width:100%; max-width:440px; display:flex; flex-direction:column; gap:16px; animation:fadeUp .4s ease both; }
    .badge-page-header { display:flex; align-items:center; gap:12px; }
    .badge-page-title { font-size:1.2rem; font-weight:900; }
    .section-title { font-size:.9rem; font-weight:800; color:var(--text-muted); margin-top:4px; display:flex; align-items:center; gap:8px; }
    .badge-count-text { background:var(--surface2); color:var(--blue2); font-size:.8rem; padding:2px 10px; border-radius:999px; }

    /* 現在の称号カード */
    .current-title-card { background:linear-gradient(135deg,rgba(255,200,0,.15),rgba(255,159,67,.08)); border:2px solid var(--yellow); border-radius:var(--radius); padding:20px; display:flex; align-items:center; gap:16px; }
    .current-title-card.no-title { border-color:var(--surface2); background:var(--surface); }
    .ct-icon { font-size:3rem; }
    .ct-label { font-size:.75rem; color:var(--text-muted); font-weight:700; }
    .ct-title { font-size:1.3rem; font-weight:900; color:var(--yellow); margin:2px 0; }
    .ct-msg { font-size:.85rem; color:var(--text); font-weight:600; }

    /* 次の称号プログレス */
    .next-title-bar { width:100%; background:var(--surface); border-radius:var(--radius-sm); padding:12px 16px; display:flex; flex-wrap:wrap; align-items:center; gap:8px; font-size:.85rem; font-weight:700; color:var(--text-muted); }
    .next-title-bar.complete { color:var(--accent); border:2px solid var(--accent); background:rgba(88,204,2,.08); justify-content:center; }
    .next-need { color:var(--blue2); margin-left:auto; }
    .next-title-progress-wrap { width:100%; height:8px; background:var(--surface2); border-radius:999px; overflow:hidden; }
    .next-title-progress-bar { height:100%; background:linear-gradient(90deg,var(--yellow),#ff9f43); border-radius:999px; transition:width .6s ease; }

    /* 称号ロードマップ */
    .title-roadmap { display:flex; flex-direction:column; gap:10px; }
    .title-row { display:flex; align-items:flex-start; gap:12px; background:var(--surface); border-radius:var(--radius-sm); padding:14px; border:2px solid transparent; transition:border-color .2s; }
    .title-row.unlocked { border-color:var(--yellow); background:rgba(255,200,0,.06); }
    .title-row.locked { opacity:.5; }
    .title-row-icon { font-size:2rem; min-width:2.5rem; text-align:center; }
    .title-row-info { flex:1; display:flex; flex-direction:column; gap:2px; }
    .title-row-name { font-size:1rem; font-weight:900; color:var(--text); }
    .title-row-cond { font-size:.75rem; color:var(--text-muted); }
    .title-row-msg { font-size:.8rem; color:var(--accent2); font-weight:600; margin-top:2px; }
    .title-row-check { font-size:1.2rem; align-self:center; }

    /* バッジカード一覧 */
    .badge-cards-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
    .badge-card { background:var(--surface); border:2px solid var(--surface2); border-radius:var(--radius-sm); padding:12px 8px; display:flex; flex-direction:column; align-items:center; gap:6px; text-align:center; transition:border-color .2s; }
    .badge-card.got { border-color:var(--yellow); background:rgba(255,200,0,.06); }
    .badge-card.notyet { opacity:.4; }
    .badge-card-icon { font-size:2rem; }
    .badge-card-name { font-size:.7rem; font-weight:700; color:var(--text-muted); line-height:1.3; }
    .badge-card.got .badge-card-name { color:var(--text); }

    /* 記録グリッド */
    .stats-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; }
    .stat-item { background:var(--surface); border-radius:var(--radius-sm); padding:12px 8px; display:flex; flex-direction:column; align-items:center; gap:4px; }
    .stat-val { font-size:1.4rem; font-weight:900; color:var(--blue2); }
    .stat-label { font-size:.65rem; color:var(--text-muted); font-weight:700; text-align:center; }
    .typing-area { width: 100%; display: flex; gap: 10px; margin-bottom: 12px; }
    .typing-input { flex: 1; background: var(--surface); border: 2px solid var(--surface2); border-radius: var(--radius-sm); color: var(--text); font-family: var(--font); font-size: 1.2rem; font-weight: 700; padding: 14px 16px; outline: none; transition: border-color .2s; }
    .typing-input:focus { border-color: var(--blue); }
    .typing-input.input-correct { border-color: var(--accent) !important; background: rgba(88,204,2,.15); }
    .typing-input.input-wrong   { border-color: var(--red)    !important; background: rgba(255,75,75,.15); animation: shake .4s ease; }
    .typing-submit-btn { background: var(--blue); border: none; color: #fff; font-family: var(--font); font-size: 1rem; font-weight: 800; padding: 14px 20px; border-radius: var(--radius-sm); cursor: pointer; white-space: nowrap; transition: transform .15s, opacity .15s; box-shadow: 0 4px 20px rgba(28,176,246,.4); }
    .typing-submit-btn:hover:not(:disabled) { transform: translateY(-2px); }
    .typing-submit-btn:disabled { opacity: .4; cursor: not-allowed; }

    /* ===== フィードバック ===== */
    .feedback-toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); padding: 14px 28px; border-radius: 999px; font-size: 1rem; font-weight: 800; z-index: 100; animation: toastIn .3s ease both, toastOut .3s ease 1.1s both; white-space: nowrap; }
    .fb-correct { background: var(--accent); color: #fff; box-shadow: 0 8px 32px var(--accent-glow); }
    .fb-wrong   { background: var(--red);    color: #fff; box-shadow: 0 8px 32px rgba(255,75,75,.4); }

    /* ===== 完了 / ゲームオーバー ===== */
    .complete-screen, .gameover-screen { width: 100%; max-width: 440px; display: flex; flex-direction: column; align-items: center; gap: 20px; padding: 40px 24px; animation: fadeUp .5s ease both; }
    .complete-icon, .go-icon { font-size: 5rem; }
    .complete-title, .go-title { font-size: 2rem; font-weight: 900; }
    .complete-msg { color: var(--text-muted); font-weight: 600; }
    .go-score-block { background: var(--surface); border-radius: var(--radius); padding: 28px 40px; text-align: center; box-shadow: var(--card-shadow); border: 2px solid var(--surface2); }
    .go-rank { font-size: 3rem; }
    .go-score { font-size: 3.5rem; font-weight: 900; color: var(--yellow); }
    .go-score-unit { font-size: 1.4rem; }
    .go-detail { color: var(--text-muted); font-weight: 600; margin-top: 6px; }
    .complete-btns { display: flex; flex-direction: column; gap: 12px; width: 100%; }
    .action-btn { width: 100%; padding: 16px; border-radius: var(--radius-sm); border: none; font-family: var(--font); font-size: 1.05rem; font-weight: 800; cursor: pointer; transition: transform .15s; }
    .action-btn:hover { transform: translateY(-2px); }
    .action-btn.primary   { background: var(--accent); color: #fff; box-shadow: 0 4px 20px var(--accent-glow); }
    .action-btn.secondary { background: var(--blue);   color: #fff; box-shadow: 0 4px 20px rgba(28,176,246,.35); }
    .action-btn.ghost     { background: var(--surface); color: var(--text-muted); }

    /* ===== アニメーション ===== */
    @keyframes fadeUp   { from{opacity:0;transform:translateY(24px)} to{opacity:1;transform:translateY(0)} }
    @keyframes bounce   { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
    @keyframes pulse-green { 0%{box-shadow:0 0 0 0 var(--accent-glow)} 70%{box-shadow:0 0 0 16px transparent} 100%{box-shadow:0 0 0 0 transparent} }
    @keyframes shake    { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-6px)} 40%{transform:translateX(6px)} 60%{transform:translateX(-4px)} 80%{transform:translateX(4px)} }
    @keyframes toastIn  { from{opacity:0;transform:translateX(-50%) translateY(16px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }
    @keyframes toastOut { from{opacity:1} to{opacity:0} }

    @media (max-width: 400px) {
      .q-kanji { font-size: 2.2rem; }
      .choice-text { font-size: .9rem; }
      .logo-title { font-size: 2.2rem; }
    }
  </style>
</head>
